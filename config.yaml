# Kalshi Makers & Takers Replication -- configuration.
# All defaults documented; change values here, not in code.

kalshi:
  # Confirmed live 2026-07-15 against docs.kalshi.com: /markets, /trades,
  # /series/{s}/markets/{t}/candlesticks, /historical/trades, and
  # /historical/markets/{t}/candlesticks all show security:[] (public, no
  # auth) in the OpenAPI spec. Step Zero re-verifies this empirically rather
  # than trusting the docs alone (guardrail: verify, don't infer).
  base_url: "https://external-api.kalshi.com/trade-api/v2"
  rate_limit:
    # Raised 2026-07-16 to Kalshi's own documented ceiling (spec S3: "<=5
    # req/s sustained, documented ceiling ~10") for the real collection
    # run -- this is the maximum polite rate, not an override of it: going
    # higher risks 429s, which cost more in backoff than staying at the
    # ceiling ever saves. Kalshi's public/unauthenticated limit is itself
    # undocumented (only authenticated tiers are published), so 10 is our
    # own read of "the ceiling," not a number Kalshi states for this tier.
    # Deliberately run ONE fetch process at a time against this budget --
    # pass1 and pass2 each open their own TokenBucket, so running both
    # concurrently would double the effective rate past the ceiling.
    requests_per_second: 10
    burst: 20
  # Step Zero's own discovery step finds these; ships empty since real
  # tickers aren't known until Step Zero runs. Once found, worth pinning
  # here so reruns are deterministic instead of re-discovering a (possibly
  # different) sample every time.
  known_early_tickers: []

dates:
  # Spec S1/S2/S6 -- pinned boundaries. All "same time" comparisons in
  # US/Eastern per spec S3; dates below are calendar dates, tz resolved at
  # the point of use, not baked in here.
  r1_window: { start: "2021-01-01", end: "2025-04-30" }
  r2_window: { start: "2025-05-01", end: "2026-06-30" }
  boundaries:
    fee_change: "2025-05-01"
    publication: "2025-09-08"
  r3_window_start: "2026-07-04"

storage:
  db_path: data/kmt.db
  raw_dir: data/raw
  parquet_dir: data/parquet
  logs_dir: data/logs
  reports_dir: reports

logging:
  level: INFO

# Kalshi fee history -- primary-artifact sourced (spec S3), right-continuous
# step function keyed on trade FILL timestamp (never seeded from a "current"
# row backwards -- see fees/schedule.py's lookup for the enforcement).
#
# Formula (both roles, both eras): fee_usd = ceil_to_cent(rate * C * P * (1-P))
# where C = contract count in the fill, P = Yes price in dollars. The ceiling
# applies to the ORDER TOTAL (C contracts at once), not per-contract -- BDW's
# own paper: "$0.07*P(1-P) per contract, total rounded up to the next cent."
# Their own "~1.77% at 50c" figure is an illustration on a C=100 order, not
# the formula itself -- see fees/schedule.py's fee_usd_for docstring.
#
# Sources:
#
# TAKER (rate=0.07, all eras, all categories):
#   BDW's own paper, Section on data construction: "$0.07*P(1-P) per
#   contract" -- this repo's replication target formula by definition, and
#   independently confirmed live via Kalshi's own published fee schedule
#   (kalshi.com/fee-schedule; corroborated by whirligigbear.substack.com's
#   independent technical breakdown, 2025-09-17: "0.07 * P * (1-P)",
#   "maximum taker fee ... at 50c, equaling 1.75c per contract"). Effective
#   date 2022-09-22 is Kalshi's ORIGINAL CFTC-filed fee schedule
#   (cftc.gov/sites/default/files/filings/orgrules/22/09/rule091222kexdcm003.pdf,
#   "Kalshi Fee Schedule.docx", filed alongside a companion redline
#   rule091222kexdcm002.pdf) -- no evidence found of a taker-rate revision
#   between then and BDW's own April-2025 sample cutoff, consistent with
#   BDW treating 0.07 as a single constant across their entire 2021-2025
#   window.
#
# MAKER pre-2025-05-01 (rate=0.0, all categories):
#   BDW's own paper, verbatim: "Kalshi began to charge fees on Makers after
#   April 2025" -- i.e. zero before that. This is the paper's own dating of
#   its sample cutoff, which this repo's spec (Claude.md S1) already
#   inherits as the R1/R2 boundary (2025-05-01).
#
# MAKER from 2025-05-01 (rate=0.0175, all categories):
#   Rate: multi-source confirmed at 25% of the taker rate --
#   "Kalshi maker fees are calculated as round_up(0.0175 * C * P * (1-P))"
#   (multiple independent web sources, 2026 vintage, converged
#   independently on the same 0.0175 figure and the "25% of taker" framing).
#   Also matches a comment already present in the sibling polymarket-forecast-lab's
#   own data/fee_schedule.yaml (sourced there from kalshi.com/fee-schedule as
#   of 2026-07-07): "maker fee (rests on the book) is 25% of that [taker]".
#
#   [VERIFY] Effective date -- UPDATED 2026-07-17, still not conclusively
#   pinned to a primary source, but the earlier blocker (couldn't extract
#   PDF text at all) is resolved and replaced by a more specific gap:
#
#   pypdf (not WebFetch/the PDF-viewer-MCP/`strings`, all of which failed
#   in an earlier pass) DID successfully extract
#   cftc.gov/filings/orgrules/rules04212519494.pdf this time. It reads:
#   "DESCRIPTION AND TERMS OF KALSHI'S 2025 MARKET MAKER PROGRAM", filed
#   2025-04-21, "effective May 3, 2025, and continues until May 3, 2027".
#   BUT this filing describes an OPT-IN, per-participant incentive scheme
#   (members sign a Form Market Maker Agreement, elect covered products in
#   Schedule I, take on quoting obligations in Schedule II, and receive
#   "predetermined incentives" in exchange) -- structurally NOT the same
#   thing as a blanket per-fill maker fee applied to every resting order
#   market-wide, which is what BDW's paper and this repo's maker/taker
#   return decomposition actually need. Read in full; no per-fill fee rate
#   (like the 0.0175 figure below) appears anywhere in its 2 pages.
#
#   Checked and ruled out as the source of the general per-fill maker fee:
#     - CFTC rules01132513688.pdf (2025-01-13, effective 2025-01-28): a
#       volume-based FEE REBATE program, unrelated to maker/taker roles.
#     - CFTC rules05022520607.pdf / rules05022520613.pdf (2025-05-02, same
#       content under two filing IDs, 155pp): a 40.6(a) rulebook amendment
#       removing the FCM-dual-trading-account prohibition -- unrelated.
#     - kalshi.com/fee-schedule via the Wayback Machine (snapshots
#       2025-04-02 and 2025-06-06, spanning the boundary): both snapshots
#       are the bare Next.js app shell with no server-rendered content --
#       the actual fee numbers load client-side and were never captured.
#     - kalshi.com/fee-schedule and kalshi.com/regulatory/notices directly:
#       blocked by a Vercel bot-protection checkpoint on every fetch
#       attempt (curl and WebFetch alike) during this research pass.
#
#   Net effect: the maker RATE (0.0175, 25% of taker) remains
#   multi-source-corroborated and unchanged from the prior pass. The
#   EFFECTIVE DATE (2025-05-01) is still an inference from BDW's own
#   "after April 2025" wording, not a verbatim date read off a primary
#   fee-schedule document -- re-verify before any real R2 net-of-cost
#   number depends on the exact day (a human checking Kalshi's regulatory
#   notices page directly, past its bot-protection, is the most direct
#   next step; the CFTC filing index has more Kalshi org-rule filings
#   than were exhausted in this pass, e.g. rules07012525155.pdf, 2025-07,
#   Rulebook v1.18, not yet read).
version: 1
schedule:
  - effective_from: "2022-09-22"
    role: taker
    category: default
    rate: 0.07
  - effective_from: "2022-09-22"
    role: maker
    category: default
    rate: 0.0
  - effective_from: "2025-05-01"
    role: maker
    category: default
    rate: 0.0175
